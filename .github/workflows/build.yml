name: Compilar ejecutables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargando codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar .exe (Windows)
        # Usamos ";" para separar rutas en Windows
        run: pyinstaller --onefile --windowed --name "FelizCumpleanos" --add-data "resources/sunflowers.json;resources" "05_01_02.py"

      - name: Subir .exe
        uses: actions/upload-artifact@v4
        with:
          name: FelizCumpleanos-Windows
          path: dist/FelizCumpleanos.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Descargando codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar .app (macOS)
        # Usamos ":" para separar rutas en macOS
        run: pyinstaller --onefile --windowed --name "FelizCumpleanos" --add-data "resources/sunflowers.json:resources" "05_01_02.py"

      - name: Subir ejecutable Mac
        uses: actions/upload-artifact@v4
        with:
          name: FelizCumpleanos-Mac
          # En Mac, el resultado principal es la carpeta .app
          path: dist/FelizCumpleanos
